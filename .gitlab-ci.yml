stages:
  - test
  - build
  - validate

variables:
  NODE_IMAGE: node:20-slim

# ─── Test ───

test:
  stage: test
  image: $NODE_IMAGE
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.23.0 --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm test
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── Build ───

build:
  stage: build
  image: $NODE_IMAGE
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.23.0 --activate
    - pnpm install --frozen-lockfile
  script:
    - pnpm build
  artifacts:
    paths:
      - packages/*/dist/
    expire_in: 1 hour
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── Validate (dogfood) ───

validate:
  stage: validate
  image: $NODE_IMAGE
  needs:
    - build
  before_script:
    - corepack enable
    - corepack prepare pnpm@10.23.0 --activate
    - pnpm install --frozen-lockfile
  script:
    - node packages/cli/dist/index.js scan "packages/core/src/**/*.ts"
        --threshold 60
        --format gitlab-report
        --output ai-validator-report.json
  artifacts:
    reports:
      codequality: ai-validator-report.json
    when: always
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH

# ─── Open Code Review (V4 self-scan) ───

open-code-review:
  stage: test
  image: node:20-slim
  script:
    - npm install -g open-code-review
    - |
      if [ -n "$CI_MERGE_REQUEST_IID" ]; then
        git fetch origin "$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"
        CHANGED=$(git diff --name-only "origin/$CI_MERGE_REQUEST_TARGET_BRANCH_NAME"...HEAD | grep -E '\.(ts|tsx)$' || true)
        if [ -n "$CHANGED" ]; then
          echo "$CHANGED" | xargs open-code-review scan --sla L1 --threshold 60 --format json --output ocr-report.json
        else
          echo "No scannable files changed"
          echo '{"score":100,"grade":"A","issues":[]}' > ocr-report.json
        fi
      else
        open-code-review scan packages/*/src --sla L1 --threshold 60 --format json --output ocr-report.json
      fi
  artifacts:
    reports:
      codequality: ocr-report.json
    when: always
  allow_failure: true
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
    - if: $CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH
